name: Captación diaria de proveedores

# 3 horarios al día para resistir los saltos de schedule de GitHub Actions
# (que silenciosamente omite ejecuciones a veces — issue conocido).
# Los lotes que repitan combo ya están deduplicados en el server.
#  · 08:00 UTC = 10:00 Madrid (verano) / 09:00 (invierno)
#  · 13:00 UTC = 15:00 Madrid (verano) / 14:00 (invierno)
#  · 18:00 UTC = 20:00 Madrid (verano) / 19:00 (invierno)
on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 13 * * *'
    - cron: '0 18 * * *'
  # Permite lanzarlo a mano desde la pestaña Actions
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Ejecutar agente en 8 combos rotados (~10-15 emails/día)
        env:
          SITE_URL:     ${{ secrets.SITE_URL }}
          CRON_SECRET:  ${{ secrets.CRON_SECRET }}
        run: |
          set -e

          # Lista de combos (categoría × ciudad). Por ahora restringido
          # a Valencia. Para expandir a otras ciudades, añade más
          # entradas a CITIES (ej. CITIES=(Valencia Madrid Barcelona)).
          CATEGORIES=(foto espacios musica flores pastel belleza animacion transporte papeleria planner joyeria catering)
          # Áreas de Valencia para multiplicar el universo de búsqueda.
          # El endpoint hace match flexible: "Valencia centro" matcha
          # también proveedores con city="Valencia" en la BD.
          CITIES=("Valencia" "Valencia centro" "Valencia provincia" "Gandía" "Sagunto" "Torrent" "Paterna" "Alzira")

          # Día del año (1-366) como semilla para que la rotación sea
          # determinista pero no repita siempre la misma categoría.
          DAY=$(date +%j)
          NUM_COMBOS=$((${#CATEGORIES[@]} * ${#CITIES[@]}))

          # 8 lotes × 3 proveedores = ~24 búsquedas. Tras filtrar
          # (sin email ni IG) y dedupe, esperamos 12-18 guardados,
          # de los cuales 7-12 reciben email automático.
          BATCHES=8

          for i in $(seq 0 $((BATCHES - 1))); do
            IDX=$(( (DAY * BATCHES + i) % NUM_COMBOS ))
            CAT_IDX=$(( IDX % ${#CATEGORIES[@]} ))
            CITY_IDX=$(( IDX % ${#CITIES[@]} ))
            CAT="${CATEGORIES[$CAT_IDX]}"
            CITY="${CITIES[$CITY_IDX]}"

            echo "────────────────────────────────────────"
            echo "Lote $((i+1))/$BATCHES · $CAT en $CITY"
            echo "────────────────────────────────────────"

            RESPONSE=$(curl -sS -X POST "$SITE_URL/api/admin/agent/auto-run" \
              -H "Content-Type: application/json" \
              -H "X-Cron-Secret: $CRON_SECRET" \
              -d "{\"category\":\"$CAT\",\"city\":\"$CITY\",\"count\":3}" \
              -w "\nHTTP_CODE:%{http_code}" || true)

            HTTP_CODE=$(echo "$RESPONSE" | grep -oE 'HTTP_CODE:[0-9]+' | cut -d: -f2)
            BODY=$(echo "$RESPONSE" | sed -E 's/HTTP_CODE:[0-9]+$//')
            echo "$BODY"
            echo "HTTP $HTTP_CODE"

            # Pausa 30s entre lotes para no exceder rate limit Anthropic
            if [ $i -lt $((BATCHES - 1)) ]; then
              echo "⏸ Esperando 30s..."
              sleep 30
            fi
          done

          echo ""
          echo "✅ Captación diaria completada"
