name: CaptaciГіn diaria de proveedores

# Cron diario a las 8:00 UTC (= 9:00 Madrid en verano, 9:00 invierno).
# Si quieres cambiarlo: https://crontab.guru
on:
  schedule:
    - cron: '0 8 * * *'
  # Permite lanzarlo a mano desde la pestaГұa Actions de GitHub
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Ejecutar agente en 8 combos rotados (~10-15 emails/dГӯa)
        env:
          SITE_URL:     ${{ secrets.SITE_URL }}
          CRON_SECRET:  ${{ secrets.CRON_SECRET }}
        run: |
          set -e

          # Lista de combos (categorГӯa Г— ciudad). Por ahora restringido
          # a Valencia. Para expandir a otras ciudades, aГұade mГЎs
          # entradas a CITIES (ej. CITIES=(Valencia Madrid Barcelona)).
          CATEGORIES=(foto espacios musica flores pastel belleza animacion transporte papeleria planner joyeria catering)
          CITIES=(Valencia)

          # DГӯa del aГұo (1-366) como semilla para que la rotaciГіn sea
          # determinista pero no repita siempre la misma categorГӯa.
          DAY=$(date +%j)
          NUM_COMBOS=$((${#CATEGORIES[@]} * ${#CITIES[@]}))

          # 8 lotes Г— 3 proveedores = ~24 bГәsquedas. Tras filtrar
          # (sin email ni IG) y dedupe, esperamos 12-18 guardados,
          # de los cuales 7-12 reciben email automГЎtico.
          BATCHES=8

          for i in $(seq 0 $((BATCHES - 1))); do
            IDX=$(( (DAY * BATCHES + i) % NUM_COMBOS ))
            CAT_IDX=$(( IDX % ${#CATEGORIES[@]} ))
            CITY_IDX=$(( IDX % ${#CITIES[@]} ))
            CAT="${CATEGORIES[$CAT_IDX]}"
            CITY="${CITIES[$CITY_IDX]}"

            echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"
            echo "Lote $((i+1))/$BATCHES В· $CAT en $CITY"
            echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ"

            RESPONSE=$(curl -sS -X POST "$SITE_URL/api/admin/agent/auto-run" \
              -H "Content-Type: application/json" \
              -H "X-Cron-Secret: $CRON_SECRET" \
              -d "{\"category\":\"$CAT\",\"city\":\"$CITY\",\"count\":3}" \
              -w "\nHTTP_CODE:%{http_code}" || true)

            HTTP_CODE=$(echo "$RESPONSE" | grep -oE 'HTTP_CODE:[0-9]+' | cut -d: -f2)
            BODY=$(echo "$RESPONSE" | sed -E 's/HTTP_CODE:[0-9]+$//')
            echo "$BODY"
            echo "HTTP $HTTP_CODE"

            # Pausa 30s entre lotes para no exceder rate limit Anthropic
            if [ $i -lt $((BATCHES - 1)) ]; then
              echo "вҸё Esperando 30s..."
              sleep 30
            fi
          done

          echo ""
          echo "вң… CaptaciГіn diaria completada"
